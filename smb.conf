[global]
  workgroup = WORKGROUP
  # This is how it appears in the Finder sidebar/Network
  server string = %%NAME%%
  netbios name = %%NAME%%
  security = user
  
  # macOS Performance & Time Machine Optimizations
  vfs objects = fruit streams_xattr
  fruit:metadata = stream
  fruit:model = MacSamba
  fruit:posix_rename = yes
  fruit:aapl = yes
  fruit:time machine = yes
  
  # Performance Tuning
  strict locking = no
  use sendfile = yes
  aio read size = 1
  aio write size = 1

[timemachine]
  path = /backups
  browsable = yes
  writable = yes
  valid users = %%USER%%
  fruit:time machine = yes
  fruit:time machine max size = %%QUOTA%%
